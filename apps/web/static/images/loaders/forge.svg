<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Forge anvil: dark body with gold/tan accents -->
  <!-- Anvil top (horn + face) -->
  <rect x="10" y="14" width="18" height="10" rx="2" fill="#DFA86A"/>
  <rect x="10" y="14" width="18" height="4" rx="2" fill="#C8904E"/>
  <!-- Anvil face (wider top block) -->
  <rect x="8" y="24" width="48" height="12" rx="3" fill="#DFA86A"/>
  <rect x="8" y="24" width="48" height="5" rx="3" fill="#C8904E"/>
  <!-- Anvil body (narrowed middle) -->
  <rect x="18" y="36" width="28" height="6" rx="1" fill="#C8904E"/>
  <!-- Anvil base -->
  <rect x="12" y="42" width="40" height="10" rx="3" fill="#DFA86A"/>
  <rect x="12" y="42" width="40" height="4" rx="3" fill="#C8904E"/>
  <!-- Dark overlay for depth -->
  <rect x="8" y="24" width="48" height="12" rx="3" fill="#1B1B1B" opacity="0.15"/>
</svg>
