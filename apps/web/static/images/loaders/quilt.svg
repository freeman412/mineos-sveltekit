<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Quilt: 2x2 patchwork grid with rotated squares -->
  <!-- Outer rounded container -->
  <rect x="4" y="4" width="56" height="56" rx="8" fill="#1a1a2e" opacity="0.08"/>
  <!-- Top-left patch: purple -->
  <rect x="6" y="6" width="24" height="24" rx="4" fill="#7B4FA0"/>
  <!-- Top-right patch: teal -->
  <rect x="34" y="6" width="24" height="24" rx="4" fill="#4FA0A0"/>
  <!-- Bottom-left patch: pink -->
  <rect x="6" y="34" width="24" height="24" rx="4" fill="#A04F7B"/>
  <!-- Bottom-right patch: cream -->
  <rect x="34" y="34" width="24" height="24" rx="4" fill="#D4C4A8"/>
  <!-- Quilt stitch lines (subtle gap between patches) -->
  <rect x="28" y="4" width="8" height="56" rx="0" fill="white"/>
  <rect x="4" y="28" width="56" height="8" rx="0" fill="white"/>
  <!-- Rounded outer border to clean up the cross -->
  <rect x="4" y="4" width="56" height="56" rx="8" fill="none" stroke="white" stroke-width="8"/>
  <!-- Re-draw patch corners to restore rounded look after white border -->
  <rect x="6" y="6" width="22" height="22" rx="4" fill="#7B4FA0"/>
  <rect x="36" y="6" width="22" height="22" rx="4" fill="#4FA0A0"/>
  <rect x="6" y="36" width="22" height="22" rx="4" fill="#A04F7B"/>
  <rect x="36" y="36" width="22" height="22" rx="4" fill="#D4C4A8"/>
</svg>
