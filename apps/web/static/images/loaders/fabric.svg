<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fabric: interlocking triangles pattern in tan/cream -->
  <!-- Large upward triangle -->
  <polygon points="32,6 58,52 6,52" fill="#DBD0B4"/>
  <!-- Inner downward triangle (cutout effect via darker shade) -->
  <polygon points="32,18 50,46 14,46" fill="#B8A98A"/>
  <!-- Center upward triangle -->
  <polygon points="32,26 44,44 20,44" fill="#DBD0B4"/>
  <!-- Small center dot -->
  <circle cx="32" cy="38" r="4" fill="#B8A98A"/>
</svg>
